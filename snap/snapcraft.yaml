name: uartly
title: UARTly
base: core22
version: '1.0'

summary: Advanced UART Serial Terminal
description: |
  UARTly is a modern, feature-rich serial terminal and logger for UART debugging.
  Features include real-time log viewing, log filtering, interactive terminal,
  configurable baud rates, and theme switching.

grade: stable
confinement: strict

license: MIT

icon: snap/gui/URTly.png

architectures:
  - build-on: amd64
  - build-on: arm64
  - build-on: armhf

apps:
  uartly:
    command: bin/uartly
    extensions: [gnome]
    environment:
      PYTHONPATH: $SNAP/usr/lib/python3/dist-packages:$SNAP/usr/lib/python3.10:$SNAP/usr/lib/python3.10/lib-dynload:$PYTHONPATH
      TCL_LIBRARY: $SNAP/usr/share/tcltk/tcl8.6
      TK_LIBRARY: $SNAP/usr/share/tcltk/tk8.6
    plugs:
      - raw-usb
      - hardware-observe
      - network
      - udisks2
      - serial-port

parts:
  uartly:
    plugin: python
    source: .
    build-environment:
      - PATH: $SNAPCRAFT_PART_INSTALL/usr/bin:$PATH
      - PYTHONPATH: $SNAPCRAFT_PART_INSTALL/usr/lib/python3/dist-packages:$PYTHONPATH
    build-packages:
      - python3-tk
      - tk-dev
      - tcl-dev
    stage-packages:
      - python3-tk
      - tk
      - tcl